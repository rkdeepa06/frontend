<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeCrest | Challenge Submissions</title>
    <link rel="stylesheet" href="main.css">
    <script src="auth-guard.js"></script>
</head>
<body>

    <header>
        <h1>🏆 CodeCrest | Challenge Submissions</h1>
        <div class="header-right">
            <a class="back-btn" href="dashboard.html">← Back to Dashboard</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <div class="page-title-bar">
        Managing: <span>Challenge Submissions</span>
    </div>

    <div class="main-content">
        <div class="card">
            <h3>📝 Challenge Submissions</h3>
            <div class="ops-row">
                <button class="action-btn active" id="btn-add" onclick="switchOp('add', this)">➕ Add Submission</button>
                <button class="action-btn" id="btn-all" onclick="switchOp('all', this); fetchAll()">📋 View All</button>
                <button class="action-btn" id="btn-find" onclick="switchOp('find', this)">🔍 Find by ID</button>
                <button class="action-btn" id="btn-update" onclick="switchOp('update', this)">✏️ Update</button>
            </div>

            <!-- ADD -->
            <div class="form-pane active" id="form-add">
                <div class="grid-2">
                    <div class="form-group">
                        <label>ID</label>
                        <input type="number" id="cs-add-id" placeholder="Enter ID" />
                    </div>
                    <div class="form-group">
                        <label>Verdict</label>
                        <select id="cs-add-verdict">
                            <option value="ACCEPTED">ACCEPTED</option>
                            <option value="WRONG_ANSWER">WRONG_ANSWER</option>
                            <option value="TIME_LIMIT_EXCEEDED">TIME_LIMIT_EXCEEDED</option>
                            <option value="COMPILATION_ERROR">COMPILATION_ERROR</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Source Code</label>
                    <textarea id="cs-add-code" rows="4" placeholder="Paste source code here"></textarea>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Execution Time (ms)</label>
                        <input type="number" id="cs-add-exectime" placeholder="e.g. 120" />
                    </div>
                    <div class="form-group">
                        <label>Points Earned</label>
                        <input type="number" id="cs-add-points" placeholder="e.g. 100" />
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Contestant ID</label>
                        <input type="number" id="cs-add-contestantid" placeholder="e.g. 1" />
                    </div>
                    <div class="form-group">
                        <label>Challenge ID</label>
                        <input type="number" id="cs-add-challengeid" placeholder="e.g. 1" />
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Contest ID</label>
                        <input type="number" id="cs-add-contestid" placeholder="e.g. 1" />
                    </div>
                    <div class="form-group">
                        <label>Submitted At</label>
                        <input type="text" id="cs-add-submittedat" placeholder="2026-06-25T10:30:00" />
                    </div>
                </div>
                <button class="btn-submit" onclick="addChallengeSubmission()">Save Submission</button>
            </div>

            <!-- VIEW ALL -->
            <div class="form-pane" id="form-all">
                <div id="table-container"><div class="empty-state">Click "View All" to load data.</div></div>
            </div>

            <!-- FIND BY ID -->
            <div class="form-pane" id="form-find">
                <div class="form-group" style="max-width:300px;">
                    <label>Submission ID</label>
                    <input type="number" id="cs-find-id" placeholder="Enter ID" />
                </div>
                <button class="btn-submit" onclick="findById(document.getElementById('cs-find-id').value)">Search</button>
                <div class="find-result" id="find-result"></div>
            </div>

            <!-- UPDATE -->
            <div class="form-pane" id="form-update">
                <div class="form-group" style="max-width:300px;">
                    <label>ID to Update</label>
                    <input type="number" id="cs-upd-id" placeholder="Enter ID" />
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Verdict</label>
                        <select id="cs-upd-verdict">
                            <option value="ACCEPTED">ACCEPTED</option>
                            <option value="WRONG_ANSWER">WRONG_ANSWER</option>
                            <option value="TIME_LIMIT_EXCEEDED">TIME_LIMIT_EXCEEDED</option>
                            <option value="COMPILATION_ERROR">COMPILATION_ERROR</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Points Earned</label>
                        <input type="number" id="cs-upd-points" placeholder="e.g. 0" />
                    </div>
                </div>
                <div class="form-group">
                    <label>Source Code</label>
                    <textarea id="cs-upd-code" rows="3" placeholder="Updated code"></textarea>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Execution Time (ms)</label>
                        <input type="number" id="cs-upd-exectime" placeholder="e.g. 200" />
                    </div>
                    <div class="form-group">
                        <label>Submitted At</label>
                        <input type="text" id="cs-upd-submittedat" placeholder="2026-06-25T11:00:00" />
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Contestant ID</label>
                        <input type="number" id="cs-upd-contestantid" placeholder="e.g. 1" />
                    </div>
                    <div class="form-group">
                        <label>Challenge ID</label>
                        <input type="number" id="cs-upd-challengeid" placeholder="e.g. 1" />
                    </div>
                </div>
                <div class="form-group" style="max-width:300px;">
                    <label>Contest ID</label>
                    <input type="number" id="cs-upd-contestid" placeholder="e.g. 1" />
                </div>
                <button class="btn-submit" onclick="updateChallengeSubmission()">Update Submission</button>
            </div>

            <div class="response-box" id="response-box"></div>
        </div>
    </div>

    <script>
        const API = "https://backendjavaa.onrender.com";
        const ENTITY_URL = {
            post:   "/auth/postsubmission",
            getAll: "/auth/getsubmission",
            getOne: "/auth/getsubmission/",
            put:    "/auth/putsubmission/",
            delete: "/auth/deletesubmission/"
        };

        async function authorizedFetch(url, options = {}) {
            const token = localStorage.getItem("jwt_token");
            if (!options.headers) options.headers = {};
            if (token) options.headers["Authorization"] = "Bearer " + token;
            return fetch(url, options);
        }

        window.onload = function () { requireAuth([ROLES.ADMIN, ROLES.CONTESTANT]); };

        function switchOp(mode, btn) {
            document.querySelectorAll(".action-btn").forEach(b => b.classList.remove("active"));
            document.querySelectorAll(".form-pane").forEach(p => p.classList.remove("active"));
            btn.classList.add("active");
            document.getElementById("form-" + mode).classList.add("active");
        }

        function logout() { ccLogout(false); }

        function showRes(message, isError) {
            const el = document.getElementById("response-box");
            el.className = "response-box " + (isError ? "error" : "success");
            el.textContent = typeof message === "object" ? JSON.stringify(message, null, 2) : message;
        }

        async function fetchAll() {
            const div = document.getElementById("table-container");
            div.innerHTML = "<em>Loading...</em>";
            try {
                const res = await authorizedFetch(API + ENTITY_URL.getAll);
                if (!res.ok) { div.innerHTML = "<span style='color:red;'>Error: " + res.status + "</span>"; return; }
                const list = await res.json();
                if (!list || list.length === 0) { div.innerHTML = "<div class='empty-state'>No records found.</div>"; return; }
                let html = "<table><thead><tr>";
                Object.keys(list[0]).forEach(k => { html += "<th>" + k.toUpperCase() + "</th>"; });
                html += "<th>ACTIONS</th></tr></thead><tbody>";
                list.forEach(row => {
                    html += "<tr>";
                    Object.values(row).forEach(v => {
                        let display = (v !== null && v !== undefined) ? String(v) : "-";
                        if (display.length > 30) display = display.substring(0, 30) + "...";
                        html += "<td title='" + String(v) + "'>" + display + "</td>";
                    });
                    html += "<td><button class='tbl-edit-btn' onclick='prefillUpdate(" + JSON.stringify(row).replace(/"/g, '&quot;') + ")'>✏️ Edit</button><button class='tbl-delete-btn' onclick='deleteRecord(" + row.id + ")'>🗑️ Delete</button></td></tr>";
                });
                html += "</tbody></table>";
                div.innerHTML = html;
            } catch (e) { div.innerHTML = "<span style='color:red;'>Could not connect to server.</span>"; }
        }

        async function findById(id) {
            const div = document.getElementById("find-result");
            if (!id) { div.innerHTML = "<span style='color:red;'>Please enter a valid ID.</span>"; return; }
            div.innerHTML = "<em>Searching...</em>";
            try {
                const res = await authorizedFetch(API + ENTITY_URL.getOne + id);
                if (!res.ok) { div.innerHTML = "<span style='color:red;'>Record not found (Status: " + res.status + ")</span>"; return; }
                const data = await res.json();
                let html = "<div class='find-result-card'><h4>Found Record — ID: " + data.id + "</h4><table>";
                Object.keys(data).forEach(k => {
                    let val = data[k];
                    if (val && typeof val === "object") val = JSON.stringify(val);
                    html += "<tr><td>" + k.toUpperCase() + "</td><td>" + (val !== null && val !== undefined ? val : "-") + "</td></tr>";
                });
                html += "</table><div class='find-result-btns'><button class='btn-edit' onclick='prefillUpdate(" + JSON.stringify(data).replace(/"/g, '&quot;') + ")'>✏️ Edit This Record</button><button class='btn-delete' onclick='deleteRecord(" + data.id + ")'>🗑️ Delete This Record</button></div></div>";
                div.innerHTML = html;
            } catch (e) { div.innerHTML = "<span style='color:red;'>Could not connect to server.</span>"; }
        }

        async function deleteRecord(id) {
            if (!confirm("Are you sure you want to delete record ID " + id + "?")) return;
            try {
                const res = await authorizedFetch(API + ENTITY_URL.delete + id, { method: "DELETE" });
                if (res.ok) { showRes("✅ Record ID " + id + " deleted successfully!", false); fetchAll(); }
                else showRes("❌ Delete failed. Status: " + res.status, true);
            } catch (e) { showRes("❌ Could not connect to server.", true); }
        }

        function prefillUpdate(data) {
            document.getElementById("cs-upd-id").value           = data.id || "";
            document.getElementById("cs-upd-code").value         = data.sourceCode || "";
            document.getElementById("cs-upd-verdict").value      = data.verdict || "ACCEPTED";
            document.getElementById("cs-upd-exectime").value     = data.executionTimeMs || "";
            document.getElementById("cs-upd-points").value       = data.pointsEarned || "";
            document.getElementById("cs-upd-contestantid").value = data.contestantId || "";
            document.getElementById("cs-upd-challengeid").value  = data.challengeId || "";
            document.getElementById("cs-upd-contestid").value    = data.contestId || "";
            document.getElementById("cs-upd-submittedat").value  = data.submittedAt || "";
            switchOp("update", document.getElementById("btn-update"));
        }

        async function addChallengeSubmission() {
            const body = {
                id:             parseInt(document.getElementById("cs-add-id").value),
                verdict:        document.getElementById("cs-add-verdict").value,
                sourceCode:     document.getElementById("cs-add-code").value,
                executionTimeMs:parseInt(document.getElementById("cs-add-exectime").value),
                pointsEarned:   parseInt(document.getElementById("cs-add-points").value),
                contestantId:   parseInt(document.getElementById("cs-add-contestantid").value),
                challengeId:    parseInt(document.getElementById("cs-add-challengeid").value),
                contestId:      parseInt(document.getElementById("cs-add-contestid").value),
                submittedAt:    document.getElementById("cs-add-submittedat").value
            };
            try {
                const r = await authorizedFetch(API + ENTITY_URL.post, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
                const data = await r.json();
                showRes(r.ok ? "✅ Submission saved!\n" + JSON.stringify(data, null, 2) : "❌ Error: " + JSON.stringify(data, null, 2), !r.ok);
            } catch (e) { showRes("❌ Could not connect to server.", true); }
        }

        async function updateChallengeSubmission() {
            const id = document.getElementById("cs-upd-id").value;
            if (!id) { showRes("❌ ID is required.", true); return; }
            const body = {
                id:             parseInt(id),
                verdict:        document.getElementById("cs-upd-verdict").value,
                sourceCode:     document.getElementById("cs-upd-code").value,
                executionTimeMs:parseInt(document.getElementById("cs-upd-exectime").value),
                pointsEarned:   parseInt(document.getElementById("cs-upd-points").value),
                contestantId:   parseInt(document.getElementById("cs-upd-contestantid").value),
                challengeId:    parseInt(document.getElementById("cs-upd-challengeid").value),
                contestId:      parseInt(document.getElementById("cs-upd-contestid").value),
                submittedAt:    document.getElementById("cs-upd-submittedat").value
            };
            try {
                const r = await authorizedFetch(API + ENTITY_URL.put + id, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
                const data = await r.json();
                showRes(r.ok ? "✅ Submission updated!\n" + JSON.stringify(data, null, 2) : "❌ Error: " + JSON.stringify(data, null, 2), !r.ok);
            } catch (e) { showRes("❌ Could not connect to server.", true); }
        }
    </script>

</body>
</html>
